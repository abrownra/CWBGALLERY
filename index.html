<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #ffffff;
  color: #1a1a1a;
}

/* Header */
.header {
  padding: 16px;
  font-size: 20px;
  font-weight: 600;
  background: #ffffff;
  border-bottom: 1px solid #e5e5e5;
}

/* Gallery Grid */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
  padding: 16px;
}

/* Images */
.gallery img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  display: block;

  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

/* Hover */
.gallery img:hover {
  transform: scale(1.1);
  box-shadow: 0 12px 30px rgba(0,0,0,0.8);
}

/* Lightbox (keep dark for contrast) */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.lightbox img {
  max-width: 92%;
  max-height: 92%;
  border-radius: 12px;
}

/* Close hint */
.close-hint {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 13px;
  color: #ffffff;
  opacity: 0.7;
}
/* Animation */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

</style>
</head>

<body>

<div class="header">OCWB Gallery</div>

<div class="gallery">
  <img src="https://richmondgov.sharepoint.com/sites/CWBAll-Staff/Shared%20Documents/My%20OCWB/Photo%20Gallery/IMG_1264.jpeg">
  <img src="https://richmondgov.sharepoint.com/sites/CWBAll-Staff/Shared%20Documents/My%20OCWB/Photo%20Gallery/IMG_1257.jpeg">
  <img src="https://richmondgov.sharepoint.com/sites/CWBAll-Staff/Shared%20Documents/My%20OCWB/Photo%20Gallery/IMG_1262.jpeg">
  <img src="https://richmondgov.sharepoint.com/sites/CWBAll-Staff/Shared%20Documents/My%20OCWB/Photo%20Gallery/IMG_1272.jpeg">
  <img src="https://richmondgov.sharepoint.com/sites/CWBAll-Staff/Shared%20Documents/My%20OCWB/Photo%20Gallery/IMG_3378.jpeg">
 
</div>

<script>
const images = document.querySelectorAll('.gallery img');
let currentIndex = 0;

function showImage(index) {
  const overlay = document.createElement('div');
  overlay.className = 'lightbox';

  overlay.innerHTML = `
    <div class="close-hint">Click anywhere to close</div>
    <img src="${images[index].src}">
  `;

  overlay.onclick = () => overlay.remove();

  document.body.appendChild(overlay);

  document.onkeydown = (e) => {
    if (e.key === 'ArrowRight') {
      overlay.remove();
      showImage((index + 1) % images.length);
    }
    if (e.key === 'ArrowLeft') {
      overlay.remove();
      showImage((index - 1 + images.length) % images.length);
    }
  };
}

images.forEach((img, index) => {
  img.onclick = () => showImage(index);
});
</script>

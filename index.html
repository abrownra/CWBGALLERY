<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  font-family: sans-serif;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  padding: 12px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
}

.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
}
</style>
</head>

<body>

<div class="gallery">
  <img src="https://richmondgov.sharepoint.com/sites/CWBAll-Staff/Shared%20Documents/Forms/AllItems.aspx?viewid=ece6e503%2Da467%2D4001%2D905b%2D0d83cbed1372&id=%2Fsites%2FCWBAll%2DStaff%2FShared%20Documents%2FMy%20OCWB%2FPhoto%20Gallery%2FIMG%5F1257%2Ejpeg&parent=%2Fsites%2FCWBAll%2DStaff%2FShared%20Documents%2FMy%20OCWB%2FPhoto%20Gallery">
  <img src="https://richmondgov.sharepoint.com/sites/CWBAll-Staff/Shared%20Documents/Forms/AllItems.aspx?id=%2Fsites%2FCWBAll%2DStaff%2FShared%20Documents%2FMy%20OCWB%2FPhoto%20Gallery%2FIMG%5F1262%2Ejpeg&viewid=ece6e503%2Da467%2D4001%2D905b%2D0d83cbed1372&parent=%2Fsites%2FCWBAll%2DStaff%2FShared%20Documents%2FMy%20OCWB%2FPhoto%20Gallery">
  <img src="https://richmondgov.sharepoint.com/sites/CWBAll-Staff/Shared%20Documents/Forms/AllItems.aspx?id=%2Fsites%2FCWBAll%2DStaff%2FShared%20Documents%2FMy%20OCWB%2FPhoto%20Gallery%2FIMG%5F1264%2Ejpeg&viewid=ece6e503%2Da467%2D4001%2D905b%2D0d83cbed1372&parent=%2Fsites%2FCWBAll%2DStaff%2FShared%20Documents%2FMy%20OCWB%2FPhoto%20Gallery">
  <img src="https://richmondgov.sharepoint.com/sites/CWBAll-Staff/Shared%20Documents/Forms/AllItems.aspx?id=%2Fsites%2FCWBAll%2DStaff%2FShared%20Documents%2FMy%20OCWB%2FPhoto%20Gallery%2FIMG%5F1272%2Ejpeg&viewid=ece6e503%2Da467%2D4001%2D905b%2D0d83cbed1372&parent=%2Fsites%2FCWBAll%2DStaff%2FShared%20Documents%2FMy%20OCWB%2FPhoto%20Gallery">
  <img src="https://richmondgov.sharepoint.com/sites/CWBAll-Staff/Shared%20Documents/Forms/AllItems.aspx?id=%2Fsites%2FCWBAll%2DStaff%2FShared%20Documents%2FMy%20OCWB%2FPhoto%20Gallery%2FIMG%5F3378%2Ejpeg&viewid=ece6e503%2Da467%2D4001%2D905b%2D0d83cbed1372&parent=%2Fsites%2FCWBAll%2DStaff%2FShared%20Documents%2FMy%20OCWB%2FPhoto%20Gallery">
</div>

<script>
document.querySelectorAll('.gallery img').forEach(img => {
  img.onclick = () => {
    const overlay = document.createElement('div');
    overlay.className = 'lightbox';
    overlay.innerHTML = '<img src="' + img.src + '">';
    overlay.onclick = () => overlay.remove();
    document.body.appendChild(overlay);
  };
});
</script>

</body>
</html>

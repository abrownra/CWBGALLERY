<!DOCTYPE html>
<html>
<head>
<style>
body {
  margin: 0;
  font-family: sans-serif;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  padding: 12px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
}

.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
}
</style>
</head>

<body>

<div class="gallery">
  <img src="PASTE_IMAGE_URL_1">
  <img src="PASTE_IMAGE_URL_2">
</div>

<script>
document.querySelectorAll('.gallery img').forEach(img => {
  img.onclick = () => {
    const overlay = document.createElement('div');
    overlay.className = 'lightbox';
    overlay.innerHTML = '<img src="' + img.src + '">';
    overlay.onclick = () => overlay.remove();
    document.body.appendChild(overlay);
  };
});
</script>

</body>
</html>
